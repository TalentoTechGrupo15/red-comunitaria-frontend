<div class="login">

  <form [formGroup]="formLogin" (ngSubmit)="iniciarSesion()" class="login__form">
    <h2 class="login__titulo">Iniciar Sesión</h2>

    <div class="login__contenedor-input">
        <app-custom-input
          name="usuario"
          id="usuario"
          label="Usuario"
          placeholder="Escriba su usuario"
          [control]="usuario"
        ></app-custom-input>

        <app-custom-input
          name="clave"
          id="clave"
          label="Contraseña"
          placeholder="Escriba su contraseña"
          [control]="clave"
        ></app-custom-input>
    </div>
    <button type="submit" class="boton boton-principal login__boton">
          Iniciar Sesión
    </button>


    <a routerLink="/registro" class="login__link-registro">Crear cuenta</a>

  </form>
</div>
