<div class="emprendimiento">
	<form [formGroup]="formEmprendimiento" (ngSubmit)="crearEmprendimiento()" class="emprendimiento__form">

		<h2 class="titulo emprendimiento__titulo">Crear Emprendimiento</h2>

		<div class="emprendimiento__contenedor-info">
			<app-custom-input
				name="nombre"
				id="nombre"
				label="Nombre"
				placeholder="Nombre del emprendimiento"
				[control]="nombre"
			></app-custom-input>

			<app-custom-input
				name="descripcion"
				id="descripcion"
				label="Descripción"
				placeholder="Descripcíon del emprendimiento"
				[control]="descripcion"
			></app-custom-input>

			<app-custom-input
				name="year"
				id="year"
				label="Año de inicio"
				placeholder="2024"
				[control]="year"
				type="number"
			></app-custom-input>

			<app-custom-input
				name="inversion"
				id="inversion"
				label="Inversión"
				placeholder="50.000"
				[control]="inversion"
				type="number"
			></app-custom-input>

			<div class="emprendimiento__campo-select">
				<label class="label">Etapa</label>
				<app-select [options]="(etapas$ | async) ?? []" (onChangeValue)="idEtapa.setValue($event)"></app-select>
			</div>

			<div class="emprendimiento__campo-select">
				<label class="label">Región</label>
				<app-select [options]="(regiones$ | async) ?? []" (onChangeValue)="idRegion.setValue($event)"></app-select>
			</div>

			<div class="emprendimiento__campo-select">
				<label class="label">Tipo de Emprendimiento</label>
				<app-select [options]="(tipos$ | async) ?? []" (onChangeValue)="idTipoEmprendimiento.setValue($event)"></app-select>
			</div>


			<div class="emprendimiento__campo-select">
				<label class="label">Equipo</label>
                <span class="emprendimiento__texto-equipo">{{(equipo$ | async)?.nombre}}</span>
			</div>
		</div>

		<button type="submit" class="boton boton-principal">Crear Emprendimiento</button>

        @if (mensaje) {
			<div class="mensaje-error">
				{{ mensaje }}
			</div>
		}
	</form>
</div>
