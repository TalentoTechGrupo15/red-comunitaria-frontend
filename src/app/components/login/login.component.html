<div class="login-container">
  <header class="top-header">
    <div class="logos">
      <div class="logo-tic">
        <img src="assets/images/logo-tic.png" alt="TIC Logo">
      </div>
      <div class="logo-tech">
        <img src="assets/images/logo-tech.png" alt="Realizate TECH Logo">
      </div>
    </div>

    <div class="header-actions">
      <button class="btn-link" (click)="navigateToCreateGroup()">
        Crear grupo
      </button>
      <button class="btn-primary-outline" (click)="navigateToCreateEnterprise()">
        Crear emprendimiento
      </button>
    </div>
  </header>

  <div class="login-content">
    <div class="login-card">
      <h1 class="login-title">Iniciar Sesión</h1>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="Nombre de usuario"
            required class="form-control" [disabled]="isLoading">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Contraseña" required
            class="form-control" [disabled]="isLoading">
        </div>

        <button type="submit" class="btn-submit" [disabled]="!loginForm.form.valid || isLoading">
          <span *ngIf="!isLoading">Iniciar sesión</span>
          <span *ngIf="isLoading" class="loading-spinner"></span>
        </button>
      </form>
    </div>
  </div>
</div>
