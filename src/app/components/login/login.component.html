<div class="login-container">




  <div class="login-content">
    <div class="login-card">
      <h1 class="login-title">Iniciar Sesión</h1>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="Nombre de usuario"
            required class="form-control" [disabled]="isLoading">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Contraseña" required
            class="form-control" [disabled]="isLoading">
        </div>

        <button type="submit" class="btn-submit" [disabled]="!loginForm.form.valid || isLoading">
          @if (!isLoading) {
          <span>Iniciar sesión</span>
          }
          @if (isLoading) {
          <span class="loading-spinner"></span>
          }
        </button>
      </form>
    </div>
  </div>
</div>
