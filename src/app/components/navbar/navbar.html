<nav class="navbar">
    <a routerLink="/" class="navbar__link">
        <app-logo-empleatech></app-logo-empleatech>
    </a>


    <div class="navbar__contenedor-botones">
        @if(!(isLogged$ | async)){

            <app-boton 
            styleButton="secondary" text="Iniciar Sesión" 
            (onClick)="goTo('/login')"></app-boton>

            <app-boton 
            text="Registrarse" (onClick)="goTo('/registro')"></app-boton>

        }@else{
            <app-boton 
            styleButton="secondary" text="Equipo" 
            (onClick)="goTo('/equipo')"></app-boton>

            <app-boton 
            text="Emprendimiento" 
            (onClick)="goTo('/emprendimiento')"></app-boton>

            <app-boton 
            text="Cerrar Sesión" 
            (onClick)="logout()"></app-boton>
        }
    </div>

</nav>
